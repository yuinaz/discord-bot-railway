<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Ganti Password</title></head>
<body>
  <form method="POST">
    <input name="old_password" type="password" placeholder="Password lama" required><br>
    <input name="new_password" type="password" placeholder="Password baru" required><br>
    <input name="confirm_password" type="password" placeholder="Konfirmasi password" required><br>
    <button type="submit">Ganti Password</button>
  </form>
</body></html>
