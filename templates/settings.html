<!-- templates/settings.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pengaturan Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5">
        <h2>Pengaturan Admin</h2>
        <form method="POST" action="/admin/settings">
            <div class="mb-3">
                <label class="form-label">Admin Discord ID</label>
                <input type="text" name="admin_ids" class="form-control" placeholder="ID dipisah koma">
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="autoban" class="form-check-input" id="autoban">
                <label class="form-check-label" for="autoban">Aktifkan Auto-Ban</label>
            </div>
            <div class="mb-3">
                <label class="form-label">Webhook URL</label>
                <input type="url" name="webhook" class="form-control">
            </div>
            <button type="submit" class="btn btn-success">Simpan</button>
        </form>
    </div>
</body>
</html>
