
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pengaturan Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light p-4">
  <div class="container">
    <h2>⚙️ Pengaturan Dashboard</h2>
    <form method="POST">
      <div class="form-check form-switch mb-3">
        <input class="form-check-input" type="checkbox" id="autoban" name="autoban" {% if settings.AUTO_BAN_ENABLED %}checked{% endif %}>
        <label class="form-check-label" for="autoban">Aktifkan Auto-Ban</label>
      </div>
      <div class="mb-3">
        <label for="adminIds" class="form-label">ID Admin (pisahkan dengan koma)</label>
        <input type="text" class="form-control" name="adminIds" value="{{ settings.ADMIN_IDS | join(', ') }}">
      </div>
      <div class="mb-3">
        <label for="webhook" class="form-label">Webhook Notifikasi</label>
        <input type="url" class="form-control" name="webhook" value="{{ settings.NOTIFY_WEBHOOK }}">
      </div>
      <button class="btn btn-outline-light" type="submit">💾 Simpan Pengaturan</button>
      <a href="/dashboard" class="btn btn-outline-secondary">⬅️ Kembali</a>
    </form>
  </div>
</body>
</html>
