<!-- templates/editor.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit main.py - SatpamBot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1e1e2f;
            color: #fff;
        }
        .editor-container {
            margin: 2rem auto;
            max-width: 900px;
        }
        textarea {
            font-family: monospace;
            background-color: #282c34;
            color: #ddd;
            padding: 1rem;
            border-radius: 8px;
            width: 100%;
            height: 600px;
            resize: vertical;
        }
    </style>
</head>
<body>
    <div class="container editor-container">
        <h2>Edit main.py</h2>
        {% if message %}
            <div class="alert alert-info">{{ message }}</div>
        {% endif %}
        <form method="POST">
            <textarea name="code" required>{{ current_code }}</textarea>
            <div class="form-check mt-3">
                <input type="checkbox" class="form-check-input" name="confirm" id="confirm" required>
                <label for="confirm" class="form-check-label">Saya yakin ingin menyimpan perubahan</label>
            </div>
            <button class="btn btn-success mt-3">💾 Simpan</button>
            <a href="/dashboard" class="btn btn-secondary mt-3">← Kembali</a>
        </form>
    </div>
</body>
</html>
