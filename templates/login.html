
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - SatpamBot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #000;
      color: white;
      text-align: center;
      padding-top: 50px;
    }
    .login-form {
      max-width: 300px;
      margin: auto;
      margin-top: 20px;
    }
    .login-form input, .login-form button {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <img src="{{ url_for('static', filename='bot_avatar.gif') }}" alt="Logo Bot" width="150">
  <form method="POST" class="login-form">
    <input class="form-control" name="username" placeholder="Username" required><br>
    <input class="form-control" name="password" type="password" placeholder="Password" required><br>
    <div class="form-check text-start">
      <input class="form-check-input" type="checkbox" name="remember">
      <label class="form-check-label">Remember Me</label>
    </div>
    <button class="btn btn-primary w-100" type="submit">Login</button>
  </form>
</body>
</html>
