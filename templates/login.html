<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SatpamBot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background-image: url('/static/bg.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      backdrop-filter: brightness(60%) blur(3px);
    }

    .login-box {
      background-color: rgba(0, 0, 0, 0.75);
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
      max-width: 400px;
    }

    .login-box img {
      width: 100px;
      border-radius: 50%;
      margin-bottom: 20px;
    }

    .btn-discord {
      background-color: #5865F2;
      color: white;
    }

    .btn-discord:hover {
      background-color: #4752c4;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <img src="/static/bot_avatar.png" alt="Bot Logo">
    <h2>Selamat datang di SatpamBot</h2>
    <p>Silakan login menggunakan akun Discord Anda.</p>
    <a href="/login/discord" class="btn btn-discord btn-lg mt-3">🔐 Login dengan Discord</a>
  </div>
</body>
</html>
