<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - SatpamBot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >
    <style>
        body {
            background: linear-gradient(to right, #1f1f2e, #2a2a3c);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background-color: #2f2f46;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 440px;
        }
        .form-check-label {
            color: #ccc;
        }
        .btn-discord {
            background-color: #5865F2;
            color: white;
        }
        .btn-discord:hover {
            background-color: #4752c4;
        }
        .bot-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-box text-center">
        <!-- Logo Bot -->
        <img src="{{ url_for('static', filename='bot_avatar.png') }}" alt="Bot Logo" class="bot-logo rounded-circle">

        <h2 class="mb-3">Login ke Dashboard</h2>

        <!-- Alert jika login gagal -->
        {% if request.args.get('error') == 'gagal' %}
        <div class="alert alert-danger" role="alert">
            Login gagal. Periksa kembali username dan password.
        </div>
        {% endif %}

        <!-- Login Superadmin Lokal -->
        <form method="POST" action="/login">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username Admin" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <div class="form-check text-start mb-3">
                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                <label class="form-check-label" for="remember">Remember Me</label>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login Admin</button>
        </form>

        <div class="my-3">
            <hr class="text-secondary">
            <span class="text-muted">atau login dengan</span>
            <hr class="text-secondary">
        </div>

        <!-- Tombol login Discord OAuth -->
        <a href="/oauth2/login" class="btn btn-discord w-100">
            <i class="bi bi-discord"></i> Login dengan Discord
        </a>

        <div class="mt-3 text-muted small">
            &copy; 2025 SatpamBot • Aman dan Cerdas
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
