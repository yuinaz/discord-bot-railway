<!-- templates/change-password.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ganti Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container mt-5">
        <h2>Ganti Password Superadmin</h2>
        {% if request.args.get('error') %}
            <div class="alert alert-danger">Password lama salah!</div>
        {% elif request.args.get('success') %}
            <div class="alert alert-success">Password berhasil diganti.</div>
        {% endif %}
        <form method="POST" action="/change-password">
            <div class="mb-3">
                <label>Password Lama</label>
                <input type="password" name="old_password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Password Baru</label>
                <input type="password" name="new_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success">Simpan</button>
            <a href="/profil" class="btn btn-secondary">Batal</a>
        </form>
    </div>
</body>
</html>
