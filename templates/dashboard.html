<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - SatpamBot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #121212; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .card { background-color: #1e1e1e; border: none; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
    .btn-outline-light { border-color: #ccc; } .btn-outline-light:hover { background-color: #ccc; color: #000; }
  </style>
</head>
<body>
  <div class="d-flex">
    <div class="bg-dark text-light p-3" style="min-width: 250px; height: 100vh; position: fixed;">
      <h4>🛡️ SatpamBot</h4><hr>
      <a href="/dashboard" class="d-block text-light py-2">📊 Dashboard</a>
      <a href="/grafik" class="d-block text-light py-2">📈 Statistik</a>
      <a href="/editor" class="d-block text-light py-2">📝 Edit main.py</a>
      <a href="/whitelist" class="d-block text-light py-2">🔐 Whitelist</a>
      <a href="/settings" class="d-block text-light py-2">⚙️ Pengaturan</a>
      <a href="/logout" class="d-block text-danger py-2">🚪 Logout</a>
    </div>
    <div class="flex-grow-1" style="margin-left: 250px;">
      <nav class="navbar navbar-dark bg-dark px-4"><span class="navbar-brand">Dashboard</span></nav>
      <div class="container my-4">
        <h2>📊 Statistik dan Kontrol</h2>
        <div class="row g-4">
          <div class="col-md-6"><div class="card p-4">
            <h5>Status Bot</h5>
            <p><strong>Uptime:</strong> {{ uptime }}</p>
            <p><strong>RAM:</strong> {{ ram_usage }} MB</p>
            <p><strong>CPU:</strong> {{ cpu_usage }}%</p>
          </div></div>
          <div class="col-md-6"><div class="card p-4">
            <h5>Opsi Admin</h5>
            <a href="/update" class="btn btn-outline-light w-100 mb-2">🔄 Force Update</a>
            <a href="/editor" class="btn btn-outline-light w-100 mb-2">📝 Edit main.py</a>
            <a href="/whitelist" class="btn btn-outline-light w-100">🔐 Edit Whitelist</a>
          </div></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
