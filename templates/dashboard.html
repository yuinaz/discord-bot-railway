<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - SatpamBot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
        rel="stylesheet">
    <style>
        body {
            background-color: #1e1e2f;
        }
        .sidebar {
            width: 220px;
            height: 100vh;
            background-color: #2a2a3c;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 60px;
        }
        .sidebar a {
            color: #ccc;
            padding: 12px 20px;
            display: block;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #444;
            color: #fff;
        }
        .topbar {
            height: 60px;
            background-color: #29293d;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 220px;
            right: 0;
            color: white;
            z-index: 10;
        }
        .content {
            margin-left: 220px;
            padding: 80px 30px;
        }
        .card {
            background-color: #2f2f46;
            border: none;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <h4 class="text-center text-light">SatpamBot</h4>
        <a href="/dashboard">🏠 Dashboard</a>
        <a href="/grafik">📈 Statistik</a>
        <a href="/settings">⚙️ Pengaturan</a>
        <a href="/admin-log">📜 Riwayat</a>
        <a href="/change-password">🔒 Ganti Password</a>
        <a href="/logout" class="text-danger">🚪 Logout</a>
    </div>

    <!-- Topbar -->
    <div class="topbar">
        <span>Dashboard Bot Discord</span>
        <span>👤 {{ username }}</span>
    </div>

    <!-- Main content -->
    <div class="content">
        <div class="row g-4">
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>🕒 Uptime</h5>
                    <p>{{ uptime or '0h 0m 0s' }}</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>💾 RAM Usage</h5>
                    <p>{{ ram_usage or '0.00' }} MB</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>⚙️ CPU Usage</h5>
                    <p>{{ cpu_usage or '0.00' }}%</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
