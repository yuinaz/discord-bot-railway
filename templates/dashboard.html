
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - SatpamBot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #000;
      color: white;
      padding: 40px;
    }
    .logo {
      display: block;
      margin: 0 auto 20px auto;
      width: 120px;
    }
  </style>
</head>
<body>
  <img src="{{ url_for('static', filename='bot_avatar.gif') }}" alt="Bot Logo" class="logo">
  <div class="container text-center">
    <h1>Dashboard Superadmin</h1>
    <p>🕒 Uptime: {{ uptime }}</p>
    <p>💾 RAM Usage: {{ ram_usage }}</p>
    <p>🧠 CPU Usage: {{ cpu_usage }}</p>
    <a href="/change-password" class="btn btn-outline-light mt-4">🔒 Ganti Password</a>
  </div>
</body>
</html>
