<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Grafik - SatpamBot</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #121212; color: #fff; }
    .container { margin-top: 50px; }
    canvas { background: #1e1e1e; border-radius: 10px; padding: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="mb-4">📊 Statistik Aktifitas Mingguan</h2>
    <canvas id="activityChart" width="600" height="300"></canvas>
  </div>
  <script>
    async function loadChartData() {
      const response = await fetch('/api/stats');
      const data = await response.json();
      const chart = new Chart(document.getElementById('activityChart').getContext('2d'), {
        type: 'line',
        data: {
          labels: ['Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab', 'Min'],
          datasets: [{
            label: 'User Aktif',
            data: [14, 12, 16, 11, 18, 9, 7],
            backgroundColor: 'rgba(88,101,242,0.2)',
            borderColor: 'rgba(88,101,242,1)',
            borderWidth: 2,
            fill: true,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { labels: { color: 'white' } }
          },
          scales: {
            x: { ticks: { color: '#ccc' } },
            y: { ticks: { color: '#ccc' } }
          }
        }
      });
    }
    loadChartData();
  </script>
</body>
</html>
